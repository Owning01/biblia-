name: biblia
description: "Biblia — Biblia Cristiana Evangélica con múltiples versiones, búsqueda precisa y personalización completa."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # DB
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.7.4
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5

  # Routing
  go_router: ^14.8.1

  # Theme
  flex_color_scheme: ^8.1.0
  google_fonts: ^6.2.1

  # Compartir
  share_plus: ^10.1.4
  screenshot: ^3.0.0

  # Notificaciones
  flutter_local_notifications: ^18.0.1

  # Utilidades
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.6+2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: "assets/logo.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
